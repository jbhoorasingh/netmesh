<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NetMesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#080b10;color:#c4cfdd;font-family:'IBM Plex Sans',system-ui,sans-serif}
  ::selection{background:#1f6feb55}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:#0b0f15}
  ::-webkit-scrollbar-thumb{background:#1d2733;border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:#2a3645}
  @keyframes nm-pulse{0%{opacity:.9;transform:scale(1)}70%{opacity:0;transform:scale(2.6)}100%{opacity:0;transform:scale(2.6)}}
  @keyframes nm-blink{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes nm-spin{to{transform:rotate(360deg)}}
  @keyframes nm-rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  input[type=range].nm-slider{-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:linear-gradient(90deg,#2f81f7,#1f6feb);outline:none}
  input[type=range].nm-slider::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#cdd9e5;border:2px solid #2f81f7;cursor:pointer;box-shadow:0 0 0 3px #2f81f733}
  button{font-family:inherit}
  [data-act]{cursor:pointer}
  [data-act][disabled]{cursor:not-allowed}
  #app{height:100vh;width:100%;display:flex;flex-direction:column;background:#080b10;color:#c4cfdd;overflow:hidden}
</style>
</head>
<body>
  <div id="app"></div>
  <script src="./app.js"></script>
</body>
</html>
