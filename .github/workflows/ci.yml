name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Vet, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi

      - name: Test (race)
        run: go test -race ./...

      - name: Build
        run: go build -o netmesh ./cmd/netmesh

      - name: Upload binary (linux/amd64)
        uses: actions/upload-artifact@v4
        with:
          name: netmesh-linux-amd64
          path: netmesh
          if-no-files-found: error
